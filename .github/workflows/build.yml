name: Build Windows EXE
on: push
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install pyinstaller -r requirements.txt
      - run: pyinstaller --onefile --windowed --add-data "*.png;." --add-data "*.gif;." --add-data "*.mp3;." --add-data "*.txt;." --add-data "*.ttf;." A_pathfinding_algorithm.py
      - uses: actions/upload-artifact@v4
        with:
          name: app-exe
          path: dist/A_pathfinding_algorithm.exe
